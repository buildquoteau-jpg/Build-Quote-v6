<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How BuildQuote Works — The Building Supply Chain</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #185D7A;
      --teal:   #4FCBB0;
      --orange: #f97316;
      --bg:     #091524;
    }

    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse 80% 60% at 50% 40%, #0f2745 0%, #091524 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── HEADER ───────────────────────────────────────────── */
    .page-top {
      text-align: center;
      padding: 2.5rem 1.5rem 0.5rem;
    }
    .bq-logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
      margin-bottom: 0.25rem;
    }
    .bq-logo .b { color: var(--teal); }
    .bq-logo .q { color: var(--orange); }
    .bq-sub {
      font-size: 0.72rem;
      color: #4a6a80;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
    }
    .page-title {
      font-size: clamp(1.3rem, 3.5vw, 2.1rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.4rem;
    }
    .page-sub {
      font-size: 0.95rem;
      color: #5a7e96;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* ── STAGE ────────────────────────────────────────────── */
    .stage {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 0.25rem 1rem;
      flex: 1;
    }
    .diamond-svg {
      width: min(92vw, 540px);
      height: min(92vw, 540px);
      overflow: visible;
    }

    /* ── CHAIN LINES ──────────────────────────────────────── */
    /*
      viewBox 0 0 560 560 — diamond centre (280,280), arm 195px:
        Top  (BQ)      = 280,  85
        East (Builder) = 475, 280   ← 3 o'clock
        South (Supplier)= 280, 475  ← 6 o'clock
        West (Mfg)     =  85, 280   ← 9 o'clock
      Side = 195√2 ≈ 276 px  →  dasharray 280
    */
    .chain-line {
      fill: none;
      stroke: var(--teal);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-dasharray: 280;
      stroke-dashoffset: 280;
      filter: url(#lineGlow);
    }
    /* slow stagger: 1.5 s draw, 1.7 s between starts */
    #L1 { animation: drawLine 1.5s ease-out  0.5s forwards; }
    #L2 { animation: drawLine 1.5s ease-out  2.2s forwards; }
    #L3 { animation: drawLine 1.5s ease-out  3.9s forwards; }
    #L4 { animation: drawLine 1.5s ease-out  5.6s forwards; }
    @keyframes drawLine { to { stroke-dashoffset: 0; } }

    /* ── FLOW DOTS ────────────────────────────────────────── */
    .flow-line {
      fill: none;
      stroke: var(--teal);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 6 36;
      stroke-dashoffset: 0;
      opacity: 0;
    }
    #F1 { animation: showFlow 0s 2.1s forwards, flowAnim 1.6s linear 2.15s infinite; }
    #F2 { animation: showFlow 0s 3.8s forwards, flowAnim 1.6s linear 3.85s infinite; }
    #F3 { animation: showFlow 0s 5.5s forwards, flowAnim 1.6s linear 5.55s infinite; }
    #F4 { animation: showFlow 0s 7.2s forwards, flowAnim 1.6s linear 7.25s infinite; }
    @keyframes showFlow { to { opacity: 0.4; } }
    @keyframes flowAnim { to { stroke-dashoffset: -42; } }

    /* ── CLICKABLE NODE GROUPS ────────────────────────────── */
    /*
      Each clickable node uses a NESTED GROUP pattern:
        outer <g transform="translate(cx,cy)">  → fixed position, no CSS
        inner <g class="node">                  → animated with CSS

      The inner group has all content centered at local (0,0).
      transform-box: fill-box + transform-origin: center then
      correctly scales from the node's visual centre.
    */
    .node {
      cursor: pointer;
      outline: none;
      transform-box: fill-box;
      transform-origin: center;
    }
    .node polygon.ring { transition: filter 0.2s ease; }
    .node:hover polygon.ring,
    .node:focus polygon.ring { filter: url(#nodeGlowHover); }
    .node.active polygon.ring { filter: url(#nodeGlowActive); }
    .node text { pointer-events: none; }

    /* entrance: nodes start hidden and pop in as their line arrives */
    #N-builder, #N-supplier, #N-mfg { opacity: 0; }

    /* L1 ends at 0.5+1.5 = 2.0 s → Builder pops in */
    #N-builder { animation: nodeIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 2.0s forwards; }
    /* L2 ends at 2.2+1.5 = 3.7 s → Supplier pops in */
    #N-supplier { animation: nodeIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 3.7s forwards; }
    /* L3 ends at 3.9+1.5 = 5.4 s → Mfg pops in */
    #N-mfg      { animation: nodeIn 0.7s cubic-bezier(0.34,1.56,0.64,1) 5.4s forwards; }

    @keyframes nodeIn {
      from { opacity: 0; transform: scale(0.3); }
      to   { opacity: 1; transform: scale(1);   }
    }

    /* ── HINT ─────────────────────────────────────────────── */
    .hint {
      text-align: center;
      font-size: 0.78rem;
      color: #2e4d60;
      padding: 0 1rem 1.5rem;
      opacity: 0;
      animation: fadeIn 1s ease 7.5s forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }

    /* ── OVERLAY & PANEL ──────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 50;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }

    .panel {
      position: fixed; top: 0; right: 0;
      width: min(460px, 100vw); height: 100vh;
      background: #0c1f35;
      border-left: 1px solid rgba(79,203,176,0.2);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.42s cubic-bezier(0.25,0.46,0.45,0.94);
      z-index: 100; overflow: hidden;
    }
    .panel.open { transform: translateX(0); }

    @media (max-width: 600px) {
      .panel {
        top: auto; bottom: 0; right: 0;
        width: 100vw; height: 88vh;
        border-left: none;
        border-top: 1px solid rgba(79,203,176,0.2);
        border-radius: 1.5rem 1.5rem 0 0;
        transform: translateY(100%);
      }
      .panel.open { transform: translateY(0); }
    }

    .p-head {
      display: flex; align-items: flex-start; gap: 1rem;
      padding: 1.75rem 1.75rem 1.25rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .p-icon {
      width: 54px; height: 54px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; flex-shrink: 0;
    }
    .p-titles { flex: 1; }
    .p-title { font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 0.25rem; }
    .p-tagline { font-size: 0.875rem; font-weight: 600; }
    .p-close {
      background: rgba(255,255,255,0.07); border: none; color: #607d8b;
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, color 0.15s;
    }
    .p-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

    .p-body {
      flex: 1; overflow-y: auto; padding: 1.5rem 1.75rem;
      scrollbar-width: thin; scrollbar-color: rgba(79,203,176,0.25) transparent;
    }
    .p-body::-webkit-scrollbar { width: 4px; }
    .p-body::-webkit-scrollbar-thumb { background: rgba(79,203,176,0.25); border-radius: 2px; }

    .p-section-label {
      font-size: 0.65rem; font-weight: 700; letter-spacing: 1.8px;
      text-transform: uppercase; color: #374f61; margin-bottom: 1.1rem;
    }
    .benefit { display: flex; gap: 0.85rem; margin-bottom: 1.35rem; }
    .b-tick {
      width: 22px; height: 22px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }
    .b-tick svg { width: 11px; height: 11px; }
    .b-head { font-size: 0.92rem; font-weight: 700; color: #e2eaf0; margin-bottom: 0.25rem; line-height: 1.3; }
    .b-body { font-size: 0.845rem; color: #5a7e96; line-height: 1.6; }

    .p-foot { padding: 1.25rem 1.75rem; border-top: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; }
    .p-cta {
      display: block; width: 100%; padding: 0.875rem 1rem;
      border-radius: 10px; border: none; font-size: 0.9rem; font-weight: 700;
      text-align: center; text-decoration: none; cursor: pointer;
      transition: filter 0.2s, transform 0.12s;
    }
    .p-cta:hover  { filter: brightness(1.12); transform: translateY(-1px); }
    .p-cta:active { transform: translateY(0); }
  </style>
</head>
<body>

  <header class="page-top">
    <div class="bq-logo"><span class="b">Build</span><span class="q">Quote</span></div>
    <p class="bq-sub">Request for Quotation, Made Simple</p>
    <h1 class="page-title">How BuildQuote Works</h1>
    <p class="page-sub">Connecting every link in the building supply chain. Click a node to discover how BuildQuote works for you.</p>
  </header>

  <main class="stage" aria-label="Interactive supply chain diagram">
    <!--
      viewBox 0 0 560 560
      Diamond centre (280,280), arm 195 px — all four corners are exactly 195px from centre:
        Top   (BQ)       = 280, 85
        East  (Builder)  = 475, 280
        South (Supplier) = 280, 475
        West  (Mfg)      =  85, 280
      Side length = 195√2 ≈ 276 px
    -->
    <svg class="diamond-svg" viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="lineGlow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="nodeGlowHover" x="-35%" y="-35%" width="170%" height="170%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="nodeGlowActive" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- faint skeleton so the diamond shape is visible before lines draw -->
      <polygon points="280,85 475,280 280,475 85,280"
               fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

      <!-- ── ANIMATED CHAIN LINES (draw one at a time) ── -->
      <line id="L1" class="chain-line" x1="280" y1="85"  x2="475" y2="280"/>
      <line id="L2" class="chain-line" x1="475" y1="280" x2="280" y2="475"/>
      <line id="L3" class="chain-line" x1="280" y1="475" x2="85"  y2="280"/>
      <line id="L4" class="chain-line" x1="85"  y1="280" x2="280" y2="85"/>

      <!-- ── CONTINUOUS FLOW DOTS ── -->
      <line id="F1" class="flow-line" x1="280" y1="85"  x2="475" y2="280"/>
      <line id="F2" class="flow-line" x1="475" y1="280" x2="280" y2="475"/>
      <line id="F3" class="flow-line" x1="280" y1="475" x2="85"  y2="280"/>
      <line id="F4" class="flow-line" x1="85"  y1="280" x2="280" y2="85"/>

      <!-- ════════════════════════════════════════════
           NODE: TOP — BuildQuote hub  (12 o'clock)
           Centred at (280, 85). Always visible.
           Diamond arm = 55.
      ════════════════════════════════════════════ -->
      <g transform="translate(280,85)">
        <!-- outer pulse ring -->
        <polygon points="0,-65 65,0 0,65 -65,0"
                 fill="none" stroke="rgba(79,203,176,0.1)" stroke-width="5"/>
        <!-- main diamond -->
        <polygon points="0,-55 55,0 0,55 -55,0"
                 fill="#112b45" stroke="#4FCBB0" stroke-width="2.5"/>
        <polygon points="0,-47 47,0 0,47 -47,0"
                 fill="rgba(79,203,176,0.07)" stroke="none"/>
        <text y="-9" text-anchor="middle" fill="#4FCBB0"
              font-size="13.5" font-weight="800"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Build</text>
        <text y="8" text-anchor="middle" fill="#f97316"
              font-size="13.5" font-weight="800"
              font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Quote</text>
        <text y="25" text-anchor="middle" fill="rgba(255,255,255,0.3)"
              font-size="8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Platform</text>
      </g>

      <!-- ════════════════════════════════════════════
           NODE: EAST — Builder  (3 o'clock)
           Corner point = (475, 280). Node centred there.
           Appears when L1 finishes drawing (t = 2.0 s).
      ════════════════════════════════════════════ -->
      <!-- outer wrapper: ONLY handles translate — no CSS transform on this element -->
      <g transform="translate(475,280)">
        <!-- inner: CSS animation scales from fill-box centre = local (0,0) = corner point -->
        <g id="N-builder" class="node" data-node="builder"
           role="button" tabindex="0" aria-label="Builder — click to learn more">
          <polygon points="0,-62 62,0 0,62 -62,0"
                   fill="none" stroke="rgba(249,115,22,0.18)" stroke-width="4"/>
          <polygon class="ring" points="0,-52 52,0 0,52 -52,0"
                   fill="#111e2e" stroke="#f97316" stroke-width="2.5"/>
          <polygon points="0,-44 44,0 0,44 -44,0"
                   fill="rgba(249,115,22,0.07)" stroke="none"/>
          <text y="-11" text-anchor="middle" font-size="20" dominant-baseline="middle">🏗️</text>
          <text y="10" text-anchor="middle" fill="#fff"
                font-size="11" font-weight="700"
                font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Builder</text>
          <text y="28" text-anchor="middle" fill="rgba(249,115,22,0.6)"
                font-size="7.5" font-weight="600"
                font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">tap to explore →</text>
        </g>
      </g>

      <!-- ════════════════════════════════════════════
           NODE: SOUTH — Local Supplier  (6 o'clock)
           Corner point = (280, 475). Node centred there.
           Appears when L2 finishes drawing (t = 3.7 s).
      ════════════════════════════════════════════ -->
      <g transform="translate(280,475)">
        <g id="N-supplier" class="node" data-node="supplier"
           role="button" tabindex="0" aria-label="Local Supplier — click to learn more">
          <polygon points="0,-62 62,0 0,62 -62,0"
                   fill="none" stroke="rgba(79,203,176,0.18)" stroke-width="4"/>
          <polygon class="ring" points="0,-52 52,0 0,52 -52,0"
                   fill="#111e2e" stroke="#4FCBB0" stroke-width="2.5"/>
          <polygon points="0,-44 44,0 0,44 -44,0"
                   fill="rgba(79,203,176,0.07)" stroke="none"/>
          <text y="-11" text-anchor="middle" font-size="20" dominant-baseline="middle">🏪</text>
          <text y="10" text-anchor="middle" fill="#fff"
                font-size="10" font-weight="700"
                font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Local Supplier</text>
          <text y="28" text-anchor="middle" fill="rgba(79,203,176,0.6)"
                font-size="7.5" font-weight="600"
                font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">tap to explore →</text>
        </g>
      </g>

      <!-- ════════════════════════════════════════════
           NODE: WEST — Manufacturer  (9 o'clock)
           Corner point = (85, 280). Node centred there.
           Appears when L3 finishes drawing (t = 5.4 s).
      ════════════════════════════════════════════ -->
      <g transform="translate(85,280)">
        <g id="N-mfg" class="node" data-node="manufacturer"
           role="button" tabindex="0" aria-label="Manufacturer — click to learn more">
          <polygon points="0,-62 62,0 0,62 -62,0"
                   fill="none" stroke="rgba(79,203,176,0.12)" stroke-width="4"/>
          <polygon class="ring" points="0,-52 52,0 0,52 -52,0"
                   fill="#111e2e" stroke="#185D7A" stroke-width="2.5"/>
          <polygon points="0,-44 44,0 0,44 -44,0"
                   fill="rgba(24,93,122,0.12)" stroke="none"/>
          <text y="-11" text-anchor="middle" font-size="20" dominant-baseline="middle">🏭</text>
          <text y="10" text-anchor="middle" fill="#fff"
                font-size="10" font-weight="700"
                font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">Manufacturer</text>
          <text y="28" text-anchor="middle" fill="rgba(79,203,176,0.55)"
                font-size="7.5" font-weight="600"
                font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">tap to explore →</text>
        </g>
      </g>

    </svg>
  </main>

  <p class="hint">Click any node to see how BuildQuote benefits that part of the chain</p>

  <div class="overlay" id="overlay"></div>

  <aside class="panel" id="panel" role="dialog" aria-modal="true" aria-labelledby="p-title">
    <div class="p-head">
      <div class="p-icon" id="p-icon"></div>
      <div class="p-titles">
        <div class="p-title"   id="p-title"></div>
        <div class="p-tagline" id="p-tagline"></div>
      </div>
      <button class="p-close" id="p-close" aria-label="Close">✕</button>
    </div>
    <div class="p-body">
      <p class="p-section-label">How BuildQuote helps you</p>
      <div id="p-benefits"></div>
    </div>
    <div class="p-foot">
      <a class="p-cta" id="p-cta" href="/">Get Started Free</a>
    </div>
  </aside>

  <script>
    const DATA = {
      builder: {
        title:    'For Builders',
        tagline:  'Quote smarter. Build faster.',
        icon:     '🏗️',
        iconBg:   'rgba(249,115,22,0.12)',
        iconBdr:  'rgba(249,115,22,0.3)',
        accent:   '#f97316',
        ctaText:  'Start Your Free RFQ',
        ctaHref:  '/',
        ctaBg:    '#f97316',
        ctaColor: '#fff',
        benefits: [
          { h: 'Create a full RFQ in minutes',
            b: 'Upload a photo of your materials list, paste a spreadsheet, or type line by line. BuildQuote structures your request instantly — ready to fire to multiple suppliers at once.' },
          { h: 'Compare quotes side-by-side',
            b: 'Receive structured responses from local suppliers and compare pricing, lead times and stock at a glance. No more messy spreadsheets or lost email threads.' },
          { h: 'No more phone tag',
            b: 'Send digitally, get responses digitally. Every supplier gets the same clear brief, and every quote comes back in a consistent format you can actually act on.' },
          { h: 'Your full project history, always on hand',
            b: 'Every quote is saved automatically. Reference past pricing, reuse materials lists from similar jobs, and know exactly what you paid — and from whom — last time.' }
        ]
      },
      supplier: {
        title:    'For Local Suppliers',
        tagline:  'Win more jobs with less admin.',
        icon:     '🏪',
        iconBg:   'rgba(79,203,176,0.12)',
        iconBdr:  'rgba(79,203,176,0.3)',
        accent:   '#4FCBB0',
        ctaText:  'Join as a BuildQuote Supplier',
        ctaHref:  '/',
        ctaBg:    '#4FCBB0',
        ctaColor: '#091524',
        benefits: [
          { h: 'Receive crystal-clear RFQs',
            b: 'BuildQuote delivers well-structured requests with exact quantities, product codes and specs. No more deciphering handwritten lists or chasing builders for missing details.' },
          { h: 'Quote faster and win more work',
            b: 'When RFQs are clear and consistent, your team can respond faster — meaning you bid on more jobs and win more business without adding overhead.' },
          { h: 'Compete on merit, not just familiarity',
            b: 'Builders using BuildQuote are actively comparing quotes. You get a genuine shot at every job based on your pricing, service and availability.' },
          { h: 'Build lasting builder relationships',
            b: 'Responding quickly and accurately earns repeat business. BuildQuote makes it easy to become the supplier builders reach for first, every time.' }
        ]
      },
      manufacturer: {
        title:    'For Manufacturers',
        tagline:  'Get specified. Stay specified.',
        icon:     '🏭',
        iconBg:   'rgba(24,93,122,0.25)',
        iconBdr:  'rgba(24,93,122,0.5)',
        accent:   '#4FCBB0',
        ctaText:  'Partner with BuildQuote',
        ctaHref:  '/',
        ctaBg:    '#185D7A',
        ctaColor: '#fff',
        benefits: [
          { h: 'Ensure your products are specified correctly',
            b: 'When builders create RFQs through BuildQuote, your products are referenced with the right codes and technical specs — reducing substitution errors at the point of sale.' },
          { h: 'Reach active builders through your stockist network',
            b: 'Builders on BuildQuote are quoting live jobs right now. Your products can be part of a connected supply chain at the exact moment a builder is deciding what to buy.' },
          { h: 'Strengthen your stockist relationships',
            b: 'BuildQuote helps your local stockists receive and respond to quotes more efficiently — making it easier for them to confidently sell your full product range.' },
          { h: 'Digital presence at the point of specification',
            b: 'Your catalogue can be surfaced directly in the quoting process, giving you visibility and influence upstream before a builder ever walks into a merchant.' }
        ]
      }
    };

    const panel   = document.getElementById('panel');
    const overlay = document.getElementById('overlay');
    const pClose  = document.getElementById('p-close');
    let   active  = null;

    function openPanel(key) {
      const d = DATA[key];
      if (!d) return;
      if (active) getNode(active)?.classList.remove('active');
      active = key;
      getNode(key)?.classList.add('active');

      document.getElementById('p-title').textContent   = d.title;
      document.getElementById('p-tagline').textContent = d.tagline;
      document.getElementById('p-tagline').style.color = d.accent;

      const icon = document.getElementById('p-icon');
      icon.textContent      = d.icon;
      icon.style.background = d.iconBg;
      icon.style.border     = '1px solid ' + d.iconBdr;

      document.getElementById('p-benefits').innerHTML = d.benefits.map(b => `
        <div class="benefit">
          <div class="b-tick" style="background:${d.accent}18;border:1px solid ${d.accent}35">
            <svg viewBox="0 0 11 11" fill="none">
              <path d="M1.5 5.5l3 3 5-5" stroke="${d.accent}" stroke-width="1.8"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <div class="b-head">${b.h}</div>
            <div class="b-body">${b.b}</div>
          </div>
        </div>
      `).join('');

      const cta = document.getElementById('p-cta');
      cta.textContent      = d.ctaText;
      cta.href             = d.ctaHref;
      cta.style.background = d.ctaBg;
      cta.style.color      = d.ctaColor;

      panel.classList.add('open');
      overlay.classList.add('open');
    }

    function closePanel() {
      panel.classList.remove('open');
      overlay.classList.remove('open');
      if (active) { getNode(active)?.classList.remove('active'); active = null; }
    }

    function getNode(key) { return document.querySelector(`[data-node="${key}"]`); }

    document.querySelectorAll('.node').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.dataset.node;
        active === k ? closePanel() : openPanel(k);
      });
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
      });
    });

    pClose.addEventListener('click', closePanel);
    overlay.addEventListener('click', closePanel);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && active) closePanel();
    });
  </script>
</body>
</html>
